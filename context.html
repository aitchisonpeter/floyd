<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dynamic AI Query</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; background: #f4f4f4; }
    textarea { width: 100%; height: 150px; margin-bottom: 10px; }
    button { padding: 10px 20px; }
    pre { background: #eee; padding: 10px; overflow-x: auto; }
  </style>
</head>
<body>
  <h1>Dynamic AI Query Interface</h1>

  <label for="promptName">Prompt Template:</label>
  <select id="promptName">
    <option value="daily_checkin">Daily Check-in</option>
    <option value="weekly_summary">Weekly Summary</option>
  </select>

  <label for="tags">Tags (comma separated):</label>
  <input type="text" id="tags" value="#note,#task">

  <label for="person">Person:</label>
  <select id="person">
    <option value="all">All</option>
    <option value="owner">Owner</option>
    <option value="partner">Partner</option>
  </select>

  <button id="buildQuery">Build Query</button>

  <h2>Generated Query:</h2>
  <textarea id="queryOutput" readonly></textarea>

  <h2>Base64-Encoded Tag Data:</h2>
  <pre id="base64Output"></pre>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwuJE9xhVd40VlWT6K2cQjdDnN5DT6C5MJLpZDo4djvxgpO7wtROU96VQvgc4oRn2cEkQ/exec"; // Replace with your deployed GAS URL

    // 1️⃣ Fetch prompt templates
    async function getPromptTemplate(name) {
      const response = await fetch(`${SCRIPT_URL}?type=context`);
      const data = await response.json();
      return data.instructions[name] || '';
    }

    // 2️⃣ Fetch filtered tag/personal_log data
    async function getTagData(tags = [], person = 'all') {
      const tagQuery = tags.join(',');
      const response = await fetch(`${SCRIPT_URL}?type=context&tags=${encodeURIComponent(tagQuery)}&person=${encodeURIComponent(person)}`);
      const data = await response.json();
      return data.personal_log || [];
    }

    // 3️⃣ Encode JSON data safely in Base64
    function encodeDataToBase64(obj) {
      const jsonString = JSON.stringify(obj);
      return btoa(unescape(encodeURIComponent(jsonString)));
    }

    // 4️⃣ Build the dynamic query
    async function buildDynamicQuery(promptName, tags = [], person = 'all') {
      const template = await getPromptTemplate(promptName);
      const tagData = await getTagData(tags, person);
      const encodedData = encodeDataToBase64(tagData);

      // Replace placeholders in the template
      const query = template
        .replace('{{tag_data_base64}}', encodedData)
        .replace('{{tags}}', tags.join(','))
        .replace('{{person}}', person);

      return { query, encodedData };
    }

    // 5️⃣ Hook up button
    document.getElementById('buildQuery').addEventListener('click', async () => {
      const promptName = document.getElementById('promptName').value;
      const tags = document.getElementById('tags').value.split(',').map(t => t.trim()).filter(Boolean);
      const person = document.getElementById('person').value;

      const { query, encodedData } = await buildDynamicQuery(promptName, tags, person);

      document.getElementById('queryOutput').value = query;
      document.getElementById('base64Output').textContent = encodedData;
    });
  </script>
</body>
</html>
