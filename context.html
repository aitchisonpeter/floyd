<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Floyd Context Builder</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, 'Segoe UI', monospace;
    }

    body {
      background: #0a0a0a;
      color: #e0e0e0;
      padding: 20px;
      min-height: 100vh;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    h1 {
      color: #edbf37;
      margin-bottom: 20px;
      font-size: 24px;
    }

    h2 {
      color: #888;
      margin: 20px 0 10px;
      font-size: 18px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .prompt-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .prompt-card {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 16px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .prompt-card:hover {
      border-color: #edbf37;
      background: #222;
    }

    .prompt-card.selected {
      border-color: #edbf37;
      background: #1f1f1f;
      box-shadow: 0 0 15px rgba(237, 191, 55, 0.2);
    }

    .prompt-key {
      color: #edbf37;
      font-weight: bold;
      margin-bottom: 8px;
      font-size: 14px;
      text-transform: uppercase;
    }

    .prompt-preview {
      color: #aaa;
      font-size: 13px;
      line-height: 1.5;
      max-height: 100px;
      overflow: hidden;
      position: relative;
    }

    .prompt-preview::after {
      content: '';
      position: absolute;
      bottom: 0;
      right: 0;
      left: 0;
      height: 40px;
      background: linear-gradient(transparent, #1a1a1a);
    }

    .selected-prompt {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 20px;
      margin: 20px 0;
    }

    .selected-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }

    .selected-title {
      color: #edbf37;
      font-weight: bold;
      font-size: 16px;
    }

    .context-options {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      margin: 20px 0;
    }

    .context-option {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 12px;
      flex: 1;
      min-width: 200px;
    }

    .context-option label {
      display: block;
      margin-bottom: 8px;
      color: #888;
      font-size: 12px;
      text-transform: uppercase;
    }

    .context-option select, 
    .context-option input {
      width: 100%;
      background: #0a0a0a;
      border: 1px solid #444;
      color: #fff;
      padding: 8px;
      border-radius: 6px;
      font-size: 14px;
    }

    textarea {
      width: 100%;
      min-height: 300px;
      background: #0a0a0a;
      border: 1px solid #333;
      color: #edbf37;
      padding: 16px;
      font-family: monospace;
      font-size: 14px;
      line-height: 1.6;
      border-radius: 8px;
      margin: 20px 0;
      resize: vertical;
    }

    .button-group {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin: 20px 0;
    }

    .btn {
      background: #333;
      color: #fff;
      border: none;
      padding: 10px 20px;
      border-radius: 25px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      display: inline-block;
    }

    .btn.primary {
      background: #edbf37;
      color: #000;
    }

    .btn:hover {
      transform: translateY(-2px);
      filter: brightness(1.1);
    }

    .btn.secondary {
      background: transparent;
      border: 1px solid #edbf37;
      color: #edbf37;
    }

    .ai-buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid #333;
    }

    .ai-btn {
      background: #1a1a1a;
      color: #fff;
      text-decoration: none;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 13px;
      border: 1px solid #444;
      transition: all 0.2s;
    }

    .ai-btn:hover {
      border-color: #edbf37;
      color: #edbf37;
    }

    .status {
      background: #1a1a1a;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 12px;
      color: #888;
    }

    .status.success {
      color: #00ff88;
      border-color: #00ff88;
    }

    .meta-info {
      color: #666;
      font-size: 12px;
      margin-top: 20px;
      text-align: right;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔧 Floyd Context Builder</h1>
    
    <!-- Prompt Selection -->
    <h2>Select Prompt Template</h2>
    <div id="promptGrid" class="prompt-grid">
      <div class="loading">Loading prompts...</div>
    </div>

    <!-- Context Options -->
    <div class="context-options" id="contextOptions" style="display: none;">
      <div class="context-option">
        <label>📅 Days Alive Range</label>
        <select id="daysRange">
          <option value="7">Last 7 days</option>
          <option value="14">Last 14 days</option>
          <option value="30" selected>Last 30 days</option>
          <option value="90">Last 90 days</option>
          <option value="all">All time</option>
        </select>
      </div>
      
      <div class="context-option">
        <label>👤 Person</label>
        <select id="personFilter">
          <option value="all">Everyone</option>
          <option value="peter">Peter only</option>
          <option value="esther">Esther only</option>
        </select>
      </div>
      
      <div class="context-option">
        <label>🏷️ Tags</label>
        <input type="text" id="tagFilter" placeholder="#dev, #idea, #note">
      </div>
    </div>

    <!-- Selected Prompt Display -->
    <div class="selected-prompt" id="selectedPrompt" style="display: none;">
      <div class="selected-header">
        <span class="selected-title" id="selectedPromptKey"></span>
        <span class="status" id="promptStatus">Ready</span>
      </div>
      <textarea id="promptOutput" readonly placeholder="Select a prompt to begin..."></textarea>
    </div>

    <!-- Action Buttons -->
    <div class="button-group" id="actionButtons" style="display: none;">
      <button class="btn primary" onclick="copyToClipboard()">📋 Copy Prompt</button>
      <button class="btn" onclick="refreshContext()">🔄 Refresh Data</button>
      <button class="btn secondary" onclick="openInAI('claude')">🚀 Open in Claude</button>
      <button class="btn secondary" onclick="openInAI('chatgpt')">🤖 Open in ChatGPT</button>
      <button class="btn secondary" onclick="openInAI('deepseek')">🔍 Open in DeepSeek</button>
    </div>

    <!-- AI Target Buttons (from config) -->
    <div id="aiTargets" class="ai-buttons"></div>

    <!-- Meta Info -->
    <div id="metaInfo" class="meta-info"></div>
  </div>

  <script>
    // 🔴 REPLACE WITH YOUR APPS SCRIPT URL
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyCaOAa1jbNlUuvJRuzaEeKUJ2Vs4sbn_qVkgZjOa-rw3JLGkhny8qNq-OMWBLkip-OHA/exec';
    
    let prompts = [];
    let aiTargets = [];
    let selectedPrompt = null;
    let contextData = null;
    let metaInfo = {};

    // Load everything on page load
    window.addEventListener('load', async () => {
      await loadPrompts();
      await loadContextData();
    });

    async function loadPrompts() {
      try {
        const response = await fetch(APPS_SCRIPT_URL + '?type=context');
        const data = await response.json();
        
        // Extract prompts from the data
        if (data.instructions) {
          prompts = Object.entries(data.instructions).map(([key, value]) => ({
            key,
            text: value
          }));
        }
        
        if (data.ai_targets) {
          aiTargets = data.ai_targets;
        }
        
        if (data._meta) {
          metaInfo = data._meta;
        }
        
        renderPromptGrid();
        renderAITargets();
        updateMetaInfo();
        
      } catch (err) {
        console.error('Failed to load prompts:', err);
        document.getElementById('promptGrid').innerHTML = `
          <div style="color: #ff6b6b; grid-column: 1/-1; text-align: center; padding: 40px;">
            Failed to load prompts: ${err.message}
          </div>
        `;
      }
    }

    async function loadContextData() {
      try {
        const days = document.getElementById('daysRange')?.value || '30';
        const person = document.getElementById('personFilter')?.value || 'all';
        const tags = document.getElementById('tagFilter')?.value || '';
        
        let url = APPS_SCRIPT_URL + '?type=context';
        url += `&days=${days}`;
        if (person !== 'all') url += `&person=${person}`;
        if (tags) url += `&tags=${tags}`;
        
        const response = await fetch(url);
        contextData = await response.json();
        
      } catch (err) {
        console.error('Failed to load context data:', err);
      }
    }

    function renderPromptGrid() {
      const grid = document.getElementById('promptGrid');
      
      if (!prompts.length) {
        grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center;">No prompts found</div>';
        return;
      }
      
      grid.innerHTML = prompts.map(p => `
        <div class="prompt-card ${selectedPrompt?.key === p.key ? 'selected' : ''}" 
             onclick="selectPrompt('${p.key}')">
          <div class="prompt-key">${p.key}</div>
          <div class="prompt-preview">${escapeHtml(p.text.substring(0, 150))}...</div>
        </div>
      `).join('');
    }

    function renderAITargets() {
      const container = document.getElementById('aiTargets');
      
      if (!aiTargets.length) {
        container.innerHTML = '';
        return;
      }
      
      container.innerHTML = aiTargets.map(target => `
        <a href="${target.url_template || '#'}" target="_blank" class="ai-btn">
          ${target.label || target.key}
        </a>
      `).join('');
    }

    function updateMetaInfo() {
      const metaEl = document.getElementById('metaInfo');
      metaEl.innerHTML = `
        Generated: ${new Date(metaInfo.generated).toLocaleString()} | 
        Days Alive: ${metaInfo.days_alive} | 
        Owner: ${metaInfo.owner_name || metaInfo.owner_id}
      `;
    }

    async function selectPrompt(key) {
      const prompt = prompts.find(p => p.key === key);
      if (!prompt) return;
      
      selectedPrompt = prompt;
      
      // Show context options and action buttons
      document.getElementById('contextOptions').style.display = 'flex';
      document.getElementById('selectedPrompt').style.display = 'block';
      document.getElementById('actionButtons').style.display = 'flex';
      
      // Update selected state in grid
      renderPromptGrid();
      
      // Update selected prompt display
      document.getElementById('selectedPromptKey').textContent = prompt.key;
      
      // Build the full prompt with context
      await buildPrompt();
    }

    async function buildPrompt() {
      if (!selectedPrompt) return;
      
      await loadContextData();
      
      let promptText = selectedPrompt.text;
      
      // Replace placeholders
      if (contextData) {
        // Add current state
        if (contextData.current_state) {
          promptText = promptText.replace('{{context}}', 
            JSON.stringify(contextData.current_state, null, 2));
        }
        
        // Add logs if available
        if (contextData.personal_log) {
          promptText = promptText.replace('{{logs}}', 
            JSON.stringify(contextData.personal_log, null, 2));
        }
        
        // Add tasks
        if (contextData.tasks) {
          promptText = promptText.replace('{{tasks}}', 
            JSON.stringify(contextData.tasks, null, 2));
        }
        
        // Add owner name
        if (contextData.identity) {
          promptText = promptText.replace(/{{owner_name}}/g, contextData.identity.name || 'Peter');
        }
        
        // Add days alive
        if (metaInfo.days_alive) {
          promptText = promptText.replace(/{{days_alive}}/g, metaInfo.days_alive);
        }
      }
      
      document.getElementById('promptOutput').value = promptText;
      document.getElementById('promptStatus').textContent = '✓ Prompt built';
      document.getElementById('promptStatus').classList.add('success');
    }

    async function refreshContext() {
      document.getElementById('promptStatus').textContent = 'Refreshing...';
      document.getElementById('promptStatus').classList.remove('success');
      await loadContextData();
      await buildPrompt();
    }

    function copyToClipboard() {
      const output = document.getElementById('promptOutput');
      output.select();
      document.execCommand('copy');
      
      document.getElementById('promptStatus').textContent = '✓ Copied to clipboard';
      document.getElementById('promptStatus').classList.add('success');
      
      setTimeout(() => {
        document.getElementById('promptStatus').textContent = 'Ready';
      }, 2000);
    }

    function openInAI(ai) {
      const prompt = document.getElementById('promptOutput').value;
      if (!prompt) return;
      
      // Encode for URL
      const encoded = encodeURIComponent(prompt);
      
      // Open in selected AI
      let url = '';
      switch(ai) {
        case 'claude':
          url = 'https://claude.ai/new';
          break;
        case 'chatgpt':
          url = 'https://chat.openai.com';
          break;
        case 'deepseek':
          url = 'https://chat.deepseek.com';
          break;
      }
      
      // Save prompt to localStorage for the AI to access
      localStorage.setItem('floyd_prompt', prompt);
      
      window.open(url, '_blank');
    }

    // Helper to escape HTML
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Auto-refresh when filters change
    document.getElementById('daysRange')?.addEventListener('change', refreshContext);
    document.getElementById('personFilter')?.addEventListener('change', refreshContext);
    document.getElementById('tagFilter')?.addEventListener('input', debounce(refreshContext, 500));

    // Debounce helper
    function debounce(func, wait) {
      let timeout;
      return function executedFunction(...args) {
        const later = () => {
          clearTimeout(timeout);
          func(...args);
        };
        clearTimeout(timeout);
        timeout = setTimeout(later, wait);
      };
    }
  </script>
</body>
</html>
