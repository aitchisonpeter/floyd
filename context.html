<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dynamic Context Query</title>
  <style>
    body { font-family: sans-serif; padding: 20px; background: #f9f9f9; }
    textarea { width: 100%; height: 120px; margin-bottom: 10px; }
    button { padding: 10px 20px; margin-bottom: 10px; }
    pre { background: #eee; padding: 10px; white-space: pre-wrap; word-break: break-word; }
  </style>
</head>
<body>
  <h1>Dynamic AI Query Builder</h1>

  <label>Prompt Name (from PROMPTS sheet):</label>
  <input type="text" id="promptName" placeholder="e.g., daily_checkin" />

  <label>Tags (comma separated):</label>
  <input type="text" id="tags" placeholder="#note,#task" />

  <label>Person (owner, partner, or all):</label>
  <input type="text" id="person" placeholder="all" />

  <label>Query:</label>
  <textarea id="userQuery" placeholder="Write your query here..."></textarea>

  <button id="buildQuery">Build Query</button>

  <h2>Final Prompt + Base64 Tag Data</h2>
  <pre id="output"></pre>

  <script>
    const GAS_URL = "AKfycbwuJE9xhVd40VlWT6K2cQjdDnN5DT6C5MJLpZDo4djvxgpO7wtROU96VQvgc4oRn2cEkQ"; // your deployed GAS URL

    async function fetchContext(tags, person) {
      const params = new URLSearchParams({
        type: 'context',
        tags: tags.join(','),
        person: person
      });
      const resp = await fetch(`${GAS_URL}?${params}`);
      return await resp.json();
    }

    async function fetchPrompt(promptName) {
      const resp = await fetch(`${GAS_URL}?type=context`);
      const data = await resp.json();
      return data.instructions[promptName] || '';
    }

    function base64Encode(obj) {
      return btoa(unescape(encodeURIComponent(JSON.stringify(obj))));
    }

    async function buildFinalPrompt() {
      const promptName = document.getElementById('promptName').value.trim();
      const tags = document.getElementById('tags').value.split(',').map(t => t.trim()).filter(Boolean);
      const person = document.getElementById('person').value.trim() || 'all';
      const userQuery = document.getElementById('userQuery').value.trim();

      if (!promptName) return alert('Enter a prompt name.');

      const promptTemplate = await fetchPrompt(promptName);
      const contextData = await fetchContext(tags, person);
      const base64Tags = base64Encode(contextData.personal_log || []);

      const finalPrompt = promptTemplate
        .replace('{{tag_data_base64}}', base64Tags)
        .replace('{{tags}}', tags.join(','))
        .replace('{{person}}', person)
        .replace('{{query}}', userQuery);

      document.getElementById('output').textContent = finalPrompt;
    }

    document.getElementById('buildQuery').addEventListener('click', buildFinalPrompt);
  </script>
</body>
</html>
