<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Floyd</title>
  <style>
    body { 
      background: #000; 
      color: #fff; 
      font-family: system-ui; 
      padding: 20px; 
      max-width: 600px; 
      margin: 0 auto; 
    }
    .card { 
      background: #111; 
      border-radius: 16px; 
      padding: 16px; 
      margin-bottom: 12px; 
      border: 1px solid #333; 
    }
    .stats-grid { 
      display: flex; 
      gap: 12px; 
      margin: 12px 0; 
    }
    .stat-box { 
      flex: 1; 
      background: #1a1a1a; 
      padding: 12px; 
      border-radius: 12px; 
      text-align: center; 
    }
    .stat-number { 
      font-size: 24px; 
      color: #edbf37; 
      font-weight: bold; 
    }
    .error { 
      color: #ff6b6b; 
      background: #2a1a1a; 
      padding: 20px; 
      border-radius: 12px; 
      border: 1px solid #ff6b6b; 
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="card" style="text-align: center;">Loading Floyd...</div>
  </div>

  <script>
    // 🔴 REPLACE THIS WITH YOUR ACTUAL APPS SCRIPT URL
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyCaOAa1jbNlUuvJRuzaEeKUJ2Vs4sbn_qVkgZjOa-rw3JLGkhny8qNq-OMWBLkip-OHA/exec';
    
    async function loadFloyd() {
      try {
        console.log('Fetching from:', APPS_SCRIPT_URL + '?type=context');
        
        const response = await fetch(APPS_SCRIPT_URL + '?type=context&v=' + Date.now());
        
        if (!response.ok) {
          throw new Error(`HTTP error! status: ${response.status}`);
        }
        
        const text = await response.text();
        console.log('Raw response:', text.substring(0, 200)); // Show first 200 chars
        
        // Check if it's HTML (starts with <)
        if (text.trim().startsWith('<')) {
          throw new Error('Got HTML instead of JSON. URL might be wrong or needs re-deploying.');
        }
        
        const data = JSON.parse(text);
        console.log('Parsed data:', data);
        
        displayData(data);
        
      } catch (error) {
        console.error('Error:', error);
        document.getElementById('app').innerHTML = `
          <div class="card error">
            <h3>❌ Failed to load Floyd</h3>
            <p>${error.message}</p>
            <p style="font-size: 12px; margin-top: 16px;">URL: ${APPS_SCRIPT_URL}</p>
            <button onclick="location.reload()" style="background: #edbf37; color: #000; border: none; padding: 8px 16px; border-radius: 20px; margin-top: 12px;">Try Again</button>
          </div>
        `;
      }
    }

    function displayData(data) {
      const state = data.current_state || {};
      const notifications = data.notification_stats || [];
      
      let html = `
        <div class="card">
          <div style="display: flex; justify-content: space-between;">
            <span>📍 ${state.location_city || 'Unknown'}</span>
            <span style="background: #333; padding: 4px 12px; border-radius: 20px;">${state.system_mode || 'home'}</span>
          </div>
        </div>
        
        <div class="card">
          <h3>📱 Notifications</h3>
          <div class="stats-grid">
            <div class="stat-box">
              <div>Today</div>
              <div class="stat-number">${state.notifications_today || 0}</div>
            </div>
            <div class="stat-box">
              <div>Total</div>
              <div class="stat-number">${state.notification_count || 0}</div>
            </div>
          </div>
          
          ${notifications.slice(0, 3).map(app => `
            <div style="display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #333;">
              <span>${app.app_name || app.package || 'App'}</span>
              <span style="color: #edbf37;">${app.count_today || 0}</span>
            </div>
          `).join('')}
        </div>
        
        <div class="card">
          <h3>💰 Finances</h3>
          <div style="display: flex; justify-content: space-between; margin-top: 8px;">
            <span>Balance</span>
            <span style="color: #edbf37; font-size: 20px;">${state.spendable_balance || '$0'}</span>
          </div>
          <div style="display: flex; justify-content: space-between; margin-top: 8px;">
            <span>Daily Allowance</span>
            <span>${state.daily_allowance || '—'}</span>
          </div>
        </div>
      `;
      
      document.getElementById('app').innerHTML = html;
    }

    // Start loading
    loadFloyd();
    
    // Refresh every 30 seconds
    setInterval(loadFloyd, 30000);
  </script>
</body>
</html>
