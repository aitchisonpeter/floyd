<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="manifest" href="manifest.json">
  <title>Floyd Context Builder</title>
  <style>
    :root {
      --bg: #000;
      --card-bg: rgba(0,0,0,0.85);
      --label-color: rgba(255,255,255,0.5);
      --text-color: #fff;
      --accent: #edbf37;
    }
    body {
      font-family: -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text-color);
      margin: 0; padding: 20px;
      min-height: 100vh;
    }
    .card {
      background: var(--card-bg);
      border-radius: 35px;
      padding: 2rem;
      max-width: 450px;
      margin: 0 auto;
      border: 1px solid rgba(255,255,255,0.15);
      box-shadow: 0 20px 50px rgba(0,0,0,0.6);
    }
    h2 { font-size: 1.2rem; font-weight: 300; margin-bottom: 2rem; text-align: center; letter-spacing: 2px; }
    .section { margin-bottom: 1.5rem; }
    .section-title {
      display: block; font-size: 0.7rem; text-transform: uppercase;
      color: var(--label-color); margin-bottom: 0.8rem; letter-spacing: 1px;
    }
    .tag-container { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
    .tag-pill {
      padding: 8px 16px; border-radius: 20px; background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1); font-size: 0.8rem; cursor: pointer; transition: 0.2s;
    }
    .tag-pill.active { background: var(--accent); color: #000; border-color: var(--accent); }
    
    textarea {
      width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 15px; color: #fff; font-size: 0.85rem; padding: 1rem;
      min-height: 100px; resize: none; box-sizing: border-box; outline: none;
      border-bottom: 2px solid rgba(237,191,55,0.3);
    }

    .date-input {
      width: 100%; background: transparent; border: none; border-bottom: 1px solid rgba(255,255,255,0.2);
      color: #fff; padding: 8px 0; margin-bottom: 10px; outline: none; font-size: 1rem;
    }

    .build-btn {
      width: 100%; padding: 1.2rem; border-radius: 20px; border: 1px solid var(--accent);
      background: rgba(237,191,55,0.1); color: var(--accent); font-size: 1rem;
      font-weight: 600; cursor: pointer; margin-top: 1rem;
    }

    #output-container { display: none; margin-top: 2rem; }
    .copy-btn {
      width: 100%; padding: 1rem; border-radius: 15px; border: none;
      background: #fff; color: #000; font-weight: 600; margin-top: 10px;
    }
  </style>
</head>
<body>

<div class="card">
  <h2>CONTEXT BUILDER</h2>

  <div class="section">
    <span class="section-title">Step 1: Select System Prompt</span>
    <div id="prompt-pills" class="tag-container">Loading prompts...</div>
  </div>

  <div class="section">
    <span class="section-title">Step 2: Filter Data</span>
    <div id="person-pills" class="tag-container">
      <div class="tag-pill active" onclick="setPerson('all', this)">All</div>
      <div class="tag-pill" onclick="setPerson('owner', this)">Owner</div>
      <div class="tag-pill" onclick="setPerson('partner', this)">Partner</div>
    </div>
    <div id="tag-pills" class="tag-container">Loading tags...</div>
    <input type="date" id="date-from" class="date-input" placeholder="From Date">
    <input type="date" id="date-to" class="date-input" placeholder="To Date">
  </div>

  <div class="section">
    <span class="section-title">Step 3: Specific Query</span>
    <textarea id="manual-query" placeholder="What should Floyd do with this context?"></textarea>
  </div>

  <button class="build-btn" id="buildBtn" onclick="compilePacket()">⚡ Compile Full Packet</button>

  <div id="output-container">
    <span class="section-title">Compiled Output</span>
    <textarea id="output-text" readonly style="min-height: 200px; font-family: monospace; font-size: 0.7rem; border-bottom: 1px solid rgba(255,255,255,0.2);"></textarea>
    <button class="copy-btn" id="copyBtn" onclick="copyToClipboard()">Copy to Clipboard</button>
  </div>
</div>

<script>
  const API_URL = 'https://script.google.com/macros/s/AKfycbwuJE9xhVd40VlWT6K2cQjdDnN5DT6C5MJLpZDo4djvxgpO7wtROU96VQvgc4oRn2cEkQ/exec'; // Ensure this matches index.html
  let selectedPerson = 'all';
  let selectedTags = new Set();
  let selectedPromptContent = "";
  let ownerBirthday = "";

  // INITIALIZE
  window.onload = () => {
    fetchTagsAndConfig();
    fetchPrompts();
  };

  async function fetchTagsAndConfig() {
    window._initCallback = (data) => {
      ownerBirthday = data.config.owner_birthday;
      const container = document.getElementById('tag-pills');
      container.innerHTML = '';
      data.tags.forEach(tag => {
        const pill = document.createElement('div');
        pill.className = 'tag-pill';
        pill.textContent = tag;
        pill.onclick = () => {
          pill.classList.toggle('active');
          selectedTags.has(tag) ? selectedTags.delete(tag) : selectedTags.add(tag);
        };
        container.appendChild(pill);
      });
    };
    loadScript(API_URL + '?type=tags&callback=_initCallback');
  }

  async function fetchPrompts() {
    const container = document.getElementById('prompt-pills');
    window._promptsCallback = (data) => {
      container.innerHTML = '';
      Object.keys(data.instructions).forEach(key => {
        const pill = document.createElement('div');
        pill.className = 'tag-pill';
        pill.textContent = key;
        pill.onclick = () => {
          container.querySelectorAll('.tag-pill').forEach(p => p.classList.remove('active'));
          pill.classList.add('active');
          selectedPromptContent = data.instructions[key];
        };
        container.appendChild(pill);
      });
    };
    loadScript(API_URL + '?type=context&callback=_promptsCallback');
  }

  function setPerson(p, el) {
    selectedPerson = p;
    document.querySelectorAll('#person-pills .tag-pill').forEach(pill => pill.classList.remove('active'));
    el.classList.add('active');
  }

  function dateToDaysAlive(dateStr) {
    if (!ownerBirthday) return 0;
    return Math.floor((new Date(dateStr) - new Date(ownerBirthday)) / 86400000);
  }

  function compilePacket() {
    if (!selectedPromptContent) { alert("Select a prompt first."); return; }
    
    const btn = document.getElementById('buildBtn');
    btn.innerText = 'Fetching Data...';

    const dFrom = document.getElementById('date-from').value;
    const dTo = document.getElementById('date-to').value;
    const query = document.getElementById('manual-query').value;

    let url = API_URL + '?type=context&callback=_compileResult&t=' + Date.now();
    if (selectedTags.size > 0) url += '&tags=' + Array.from(selectedTags).join(',');
    if (selectedPerson !== 'all') url += '&person=' + selectedPerson;
    if (dFrom) url += '&from=' + dateToDaysAlive(dFrom);
    if (dTo) url += '&to=' + dateToDaysAlive(dTo);

    window._compileResult = (data) => {
      const finalOutput = `--- SYSTEM PROMPT ---\n${selectedPromptContent}\n\n` +
                          `--- JSON DATA ---\n${JSON.stringify(data, null, 2)}\n\n` +
                          `--- USER QUERY ---\n${query || "No specific query provided."}`;
      
      document.getElementById('output-text').value = finalOutput;
      document.getElementById('output-container').style.display = 'block';
      btn.innerText = '⚡ Compile Full Packet';
      window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    };
    loadScript(url);
  }

  function copyToClipboard() {
    const copyText = document.getElementById("output-text");
    copyText.select();
    copyText.setSelectionRange(0, 99999);
    navigator.clipboard.writeText(copyText.value);
    document.getElementById('copyBtn').innerText = '✓ Copied!';
    setTimeout(() => { document.getElementById('copyBtn').innerText = 'Copy to Clipboard'; }, 2000);
  }

  function loadScript(url) {
    const s = document.createElement('script');
    s.src = url;
    document.body.appendChild(s);
  }
</script>

</body>
</html>
