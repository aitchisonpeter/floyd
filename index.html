<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="tuliptown.webp">
  <link rel="icon" type="image/png" href="favicon squoosh.png">
  <link rel="manifest" href="manifest.json">
  <title>Floyd</title>
  <style>
    :root {
      --bg: #000;
      --card-bg: rgba(0,0,0,0.85);
      --label-color: rgba(255,255,255,0.5);
      --text-color: #fff;
    }
    body { 
      font-family: -apple-system, sans-serif; 
      display: flex; justify-content: center; 
      background: var(--bg); 
      color: var(--text-color); 
      margin: 0; padding: 20px 0; min-height: 100vh;
      transition: background 1s ease, color 0.5s ease;
    }
    .card { 
      padding: 2.5rem; border-radius: 35px; width: 90%; max-width: 450px; 
      backdrop-filter: blur(20px); 
      background: var(--card-bg);
      border: 1px solid rgba(255, 255, 255, 0.15); 
      box-shadow: 0 20px 50px rgba(0,0,0,0.6);
      z-index: 10;
      transition: background 1s ease;
    }
    .status-item { margin-bottom: 1.6rem; border-bottom: 1px solid rgba(255,255,255,0.08); padding-bottom: 0.6rem; }
    .label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; display: block; margin-bottom: 0.4rem; color: var(--label-color); }
    .value { font-size: 1.5rem; font-weight: 300; display: block; color: var(--text-color); }
    .value-daily_allowance { font-size: 4rem; font-weight: 200; color: #edbf37; line-height: 1; margin-bottom: 10px; }
    .location-container { display: flex; align-items: center; justify-content: space-between; }
    .mode-icon { 
      width: 75px; height: 75px; border-radius: 15px; 
      background-size: cover; background-repeat: no-repeat; background-position: center; 
      border: none; transition: transform 0.1s;
    }
    .mode-icon:active { transform: scale(0.95); }
    #num-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; }
    #num-input-box { background: #1a1a1a; padding: 2.5rem; border-radius: 30px; text-align: center; width: 85%; max-width: 320px; border: 1px solid #333; }
    #numeric-field { width: 100%; background: transparent; border: none; border-bottom: 2px solid #edbf37; color: #fff; font-size: 3rem; text-align: center; outline: none; margin-bottom: 20px; }
    #confirm-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; }
    #confirm-box { background: #1a1a1a; padding: 2.5rem; border-radius: 30px; text-align: center; width: 85%; max-width: 320px; border: 1px solid #e9858c; }
    .action-btn { background: rgba(255,255,255,0.15); border: none; color: var(--text-color); width: 35px; height: 35px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .copy-btn { width: 100%; margin-top: 20px; padding: 15px; border-radius: 20px; background: rgba(255,255,255,0.05); color: var(--text-color); border: 1px solid rgba(255,255,255,0.15); text-transform: uppercase; letter-spacing: 2px; font-size: 0.7rem; cursor: pointer; }
    .reset-btn { width: 100%; margin-top: 10px; padding: 15px; border-radius: 20px; background: rgba(233,133,140,0.1); color: #e9858c; border: 1px solid rgba(233,133,140,0.3); text-transform: uppercase; letter-spacing: 2px; font-size: 0.7rem; cursor: pointer; }
    a.location-link { color: var(--text-color); text-decoration: underline; text-underline-offset: 4px; }
  </style>
</head>
<body>

  <div id="num-overlay">
    <div id="num-input-box">
      <div id="modal-label" class="label" style="margin-bottom:15px;">Update</div>
      <input type="number" inputmode="decimal" id="numeric-field">
      <div style="display:flex; gap:10px;">
        <button onclick="closeModal()" style="flex:1; padding:12px; background:#333; color:#fff; border-radius:12px; border:none;">Cancel</button>
        <button id="save-num-btn" style="flex:1; padding:12px; background:#fff; color:#000; border-radius:12px; border:none; font-weight:bold;">Save</button>
      </div>
    </div>
  </div>

  <div id="confirm-overlay">
    <div id="confirm-box">
      <div class="label" style="margin-bottom:15px; color:#e9858c;">New Cycle Started?</div>
      <div class="value" style="font-size:1rem; margin-bottom:20px; color:rgba(255,255,255,0.7);">This will log today as Day 1 of a new cycle.</div>
      <div style="display:flex; gap:10px;">
        <button onclick="closeConfirm()" style="flex:1; padding:12px; background:#333; color:#fff; border-radius:12px; border:none;">Cancel</button>
        <button onclick="confirmReset()" style="flex:1; padding:12px; background:#e9858c; color:#000; border-radius:12px; border:none; font-weight:bold;">Confirm</button>
      </div>
    </div>
  </div>

  <div class="card">
    <div id="status-container">Syncing...</div>
    <div id="action-container"></div>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxtpDnRy112tmmCblg_tpJNevD1whZ6hqRWipPFQMT-ljXDkXYp1pUhdBps-0IV_OUFAQ/exec";
    let activeKey = "";
    let voiceTimer;
    let ownerBirthday = '';
    let partnerName = '';
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = 'en-US';

    function showConfirm() {
      document.getElementById('confirm-overlay').style.display = 'flex';
    }

    function closeConfirm() {
      document.getElementById('confirm-overlay').style.display = 'none';
    }

    async function confirmReset() {
      closeConfirm();
      const today = new Date().toISOString().split('T')[0];
      const daysAlive = ownerBirthday
        ? Math.floor((new Date() - new Date(ownerBirthday)) / 86400000)
        : 0;
      await fetch(API_URL, {
        method: 'POST',
        body: JSON.stringify({ key: 'cycle_reset', person: partnerName || 'partner', value: today, days_alive: daysAlive })
      });
      refresh();
    }

    async function copyContext() {
  const btn = document.getElementById('copyBtn');
  if (btn) btn.innerText = 'Fetching...';
  
  window._contextCallback = function(data) {
    const el = document.createElement('textarea');
    el.value = JSON.stringify(data, null, 2);
    document.body.appendChild(el);
    el.select();
    document.execCommand('copy');
    document.body.removeChild(el);
    if (btn) btn.innerText = 'Copied!';
    setTimeout(() => { if (btn) btn.innerText = 'Copy Floyd Context'; }, 3000);
    delete window._contextCallback;
  };

  var script = document.createElement('script');
  script.src = API_URL + '?type=context&callback=_contextCallback&t=' + Date.now();
  script.onerror = function() {
    if (btn) btn.innerText = 'Failed — Try Again';
  };
  document.body.appendChild(script);
}

    function handleAction(key) {
  if (key === 'cycle_reset') showConfirm();
  if (key === 'copy_context') copyContext();
  if (key === 'context_builder') window.open('context.html', '_blank');
}

    function updateLocation() {
      if (!navigator.geolocation) return;
      navigator.geolocation.getCurrentPosition(function(pos) {
        const coords = pos.coords.latitude + ',' + pos.coords.longitude;
        fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify({ key: 'current_location', value: coords })
        });
      });
    }

    function refresh() {
      updateLocation();
      var script = document.createElement('script');
      script.src = API_URL + '?type=dashboard&callback=render&t=' + Date.now();
      document.body.appendChild(script);
    }

    function triggerUpdate(key, label) {
      activeKey = key;
      document.getElementById('modal-label').innerText = label;
      document.getElementById('numeric-field').value = "";
      document.getElementById('num-overlay').style.display = 'flex';
      setTimeout(() => document.getElementById('numeric-field').focus(), 100);
    }

    function closeModal() { document.getElementById('num-overlay').style.display = 'none'; }

    document.getElementById('save-num-btn').onclick = async function() {
      const val = document.getElementById('numeric-field').value;
      if (!val) return;
      this.innerText = "...";
      await fetch(API_URL, { method: 'POST', body: JSON.stringify({ key: activeKey, value: val }) });
      this.innerText = "Save";
      closeModal();
      refresh();
    };

    function startVoice(e) {
      e.preventDefault();
      voiceTimer = setTimeout(() => {
        try { recognition.start(); window.navigator.vibrate(50); } catch(e) {}
      }, 600);
    }

    function stopVoice() {
      clearTimeout(voiceTimer);
      try { recognition.stop(); } catch(e) {}
    }

    recognition.onresult = async (event) => {
      const text = event.results[0][0].transcript;
      document.getElementById('status-container').innerText = "Logging: " + text;
      await fetch(API_URL, { method: 'POST', body: JSON.stringify({ key: 'voice_note', value: text }) });
      setTimeout(refresh, 1500);
    };

    function render(data) {
      if (data._owner_birthday) ownerBirthday = data._owner_birthday;
      if (data._partner_name) partnerName = data._partner_name.toLowerCase();

      // Apply theme via CSS variables
      if (data._themes && data._themes[data.system_mode]) {
        const theme = data._themes[data.system_mode];
        const root = document.documentElement;
        root.style.setProperty('--bg', theme.background);
        root.style.setProperty('--card-bg', theme.card);
        root.style.setProperty('--label-color', theme.label);
        root.style.setProperty('--text-color', theme.text || '#fff');
        document.body.style.background = theme.background;
      }

      document.body.className = 'mode-' + (data.system_mode || 'home');
      const container = document.getElementById('status-container');
      const actionContainer = document.getElementById('action-container');
      const config = data._display_config || [];
      const actions = data._actions || [];
      const mode = data.system_mode || 'home';
      const estherStatus = data.esther_status || 'home';

      const visible = config
        .filter(item => {
          if (item.modes !== 'all' && !item.modes.split(',').includes(mode)) return false;
          if (item.condition === 'always') return true;
          if (item.condition === 'esther_status=home' && estherStatus === 'home') return true;
          if (item.condition === 'esther_status=working' && estherStatus === 'working') return true;
          return false;
        })
        .sort((a, b) => a.priority - b.priority);

      let html = '';
      visible.forEach(item => {
        const key = item.key;
        const label = item.label;
        const value = data[key];

        if (!value && key !== 'current_location') return;

        if (key === 'current_location') {
          let icon = data.location_icon || 'tuliptown.webp';
          html += `<div class="status-item"><span class="label">Location</span><div class="location-container">
            <span class="value"><a href="https://www.google.com/maps?q=${value}" target="_blank" class="location-link">${data.location_city}</a></span>
            <div class="mode-icon" style="background-image: url('${icon}')" ontouchstart="startVoice(event)" ontouchend="stopVoice()"></div>
          </div></div>`;
        } else {
          let btn = '';
          if (key === 'gas_target') btn = `<button class="action-btn" onclick="triggerUpdate('odometer','Odometer')">+</button>`;
          if (key === 'spendable_balance') btn = `<button class="action-btn" onclick="triggerUpdate('spendable_balance','Balance')">✎</button>`;
          html += `<div class="status-item"><span class="label">${label}</span>
            <div style="display:flex; justify-content:space-between; align-items:center;">
            <span class="value value-${key}">${value}</span>${btn}</div></div>`;
        }
      });
      container.innerHTML = html;

      let btnHtml = '';
      actions
  .filter(a => a.modes === 'all' || a.modes.split(',').includes(mode))
  .sort((a, b) => a.priority - b.priority)
  .forEach(a => {
    if (a.style === 'reset') {
      btnHtml += `<button class="reset-btn" onclick="handleAction('${a.key}')">${a.label}</button>`;
    } else if (a.style === 'copy') {
      btnHtml += `<button id="copyBtn" class="copy-btn" onclick="handleAction('${a.key}')">${a.label}</button>`;
    } else if (a.style === 'link') {
      btnHtml += `<button class="copy-btn" onclick="handleAction('${a.key}')">${a.label}</button>`;
    }
  });
      actionContainer.innerHTML = btnHtml;
    }

    refresh();
    setInterval(refresh, 60000);
  </script>
</body>
</html>
