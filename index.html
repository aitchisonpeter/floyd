<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Floyd">
  <style>
    /* ... Keep all your CSS exactly as it was ... */
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; margin: 0; transition: background 1.2s ease, color 0.6s ease; background: #000; color: #fff; overflow-y: auto; padding: 20px 0; }
    .card { text-align: left; padding: 2.5rem; border-radius: 35px; width: 90%; max-width: 450px; backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); transition: all 0.8s ease; z-index: 10; margin-bottom: 20px; }
    /* (Insert the rest of your CSS here) */
  </style>
</head>
<body class="mode-tuliptown">
  <div class="card">
    <div id="status-container">Syncing Binary State...</div>
    <button id="copyBtn" class="copy-btn" onclick="copyContext()">Copy Floyd Context</button>
  </div>

  <script>
    // YOUR LIVE DEPLOYMENT URL
    const API_ENDPOINT = "https://script.google.com/macros/s/AKfycbxmd000vA2S8gFX4C63DT4TbOF81KzGhC9fGL2BIOjRoUt5dJy2hTzWK8AXmHyjHYnAYA/exec";

    /**
     * REFRESH: Fetches system data for the dashboard
     */
    async function refresh() {
      try {
        const response = await fetch(`${API_ENDPOINT}?type=dashboard`);
        const data = await response.json();
        if (data.error) throw new Error(data.error);
        showSystemStatus(data);
      } catch (err) {
        document.getElementById('status-container').innerText = 'Connection to Binary State Lost';
        console.error("Fetch Error:", err);
      }
    }

    /**
     * COPY CONTEXT: Fetches the full AI context and copies to clipboard
     */
    async function copyContext() {
      const btn = document.getElementById('copyBtn');
      btn.innerText = 'Pulling Context...';
      
      try {
        const response = await fetch(`${API_ENDPOINT}?type=context`);
        const data = await response.json();
        
        const el = document.createElement('textarea');
        el.value = JSON.stringify(data, null, 2);
        document.body.appendChild(el);
        el.select();
        document.execCommand('copy');
        document.body.removeChild(el);
        
        btn.innerText = 'Copied to Clipboard';
        setTimeout(() => { btn.innerText = 'Copy Floyd Context'; }, 3000);
      } catch (err) {
        btn.innerText = 'Sync Failed';
        console.error(err);
      }
    }

    /**
     * UI RENDERER: Same logic you had, just cleaner
     */
    function showSystemStatus(data) {
      if (!data) return;
      document.body.className = 'mode-' + (data.system_mode || 'tuliptown');
      const container = document.getElementById('status-container');
      let html = '';
      
      const order = [
        'daily_allowance', 'spendable_balance', 'gas_target', 
        'peter_appointments', 'esther_mood', 'esther_start_location', 
        'esther_finish_location', 'current_location'
      ];

      order.forEach(key => {
        if (!data[key] || key === 'system_mode') return;
        if ((key === 'esther_start_location' || key === 'esther_finish_location') && data[key].toString().trim() === "") return;

        if (key === 'current_location') {
          let flag = (data.system_mode === 'international') ? "🇲🇽" : "🇨🇦";
          let iconUrl = (data.system_mode === 'van') 
                ? "https://www.gstatic.com/images/icons/material/system/2x/directions_bus_black_24dp.png" 
                : "https://www.gstatic.com/images/icons/material/system/2x/location_on_black_24dp.png";
          
          let styleAttr = `style="background-image: url('${iconUrl}')"`;

          html += `
            <div class="status-item">
              <span class="label">Current Location</span>
              <div class="location-container">
                <span class="value">
                  <span class="flag">${flag}</span>
                  <a href="${data[key]}" target="_blank" class="location-link">${data.location_city}</a>
                </span>
                <div class="mode-icon" ${styleAttr}></div>
              </div>
            </div>`;
        } else {
          let displayLabel = key === 'gas_target' ? 'Get Gas Before' : key.replace(/_/g, ' ');
          html += `
            <div class="status-item">
              <span class="label">${displayLabel}</span>
              <span class="value value-${key}">${data[key]}</span>
            </div>`;
        }
      });
      container.innerHTML = html;
    }

    // Initial Sync
    refresh();
    // Auto-refresh every 60 seconds
    setInterval(refresh, 60000);
  </script>
</body>
</html>
