<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="tuliptown.webp">
  <link rel="icon" type="image/png" href="favicon squoosh.png">
  <link rel="manifest" href="manifest.json">
  <title>Floyd</title>
  <style>
    /* Reset & Dark UI Foundation */
    body { 
      font-family: -apple-system, sans-serif; 
      display: flex; justify-content: center; 
      background: #000; color: #fff; 
      margin: 0; padding: 20px 0; min-height: 100vh;
      transition: background 1s ease;
    }

    /* The Unified Card: Dark & High Contrast to fix the blur issues */
    .card { 
      padding: 2.5rem; border-radius: 35px; width: 90%; max-width: 450px; 
      backdrop-filter: blur(20px); 
      background: rgba(0, 0, 0, 0.85); 
      border: 1px solid rgba(255, 255, 255, 0.15); 
      box-shadow: 0 20px 50px rgba(0,0,0,0.6);
      z-index: 10;
    }

    .status-item { margin-bottom: 1.6rem; border-bottom: 1px solid rgba(255,255,255,0.08); padding-bottom: 0.6rem; }
    .label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; display: block; margin-bottom: 0.4rem; color: rgba(255,255,255,0.5); }
    .value { font-size: 1.5rem; font-weight: 300; display: block; color: #fff; }
    .value-daily_allowance { font-size: 4rem; font-weight: 200; color: #edbf37; line-height: 1; margin-bottom: 10px; }

    /* Interaction Elements */
    .location-container { display: flex; align-items: center; justify-content: space-between; }
    .mode-icon { 
      width: 75px; height: 75px; border-radius: 15px; 
      background-size: cover; background-repeat: no-repeat; background-position: center; 
      border: none;
      transition: transform 0.1s;
    }
    .mode-icon:active { transform: scale(0.95); border-color: #fff; }

    /* Themes (Background Only) */
    body.mode-tuliptown { background: linear-gradient(135deg, #4970af, #4b7a50) fixed; }
    body.mode-van { background: linear-gradient(135deg, #f8aa60, #ffefcb) fixed; }
    body.mode-international { background: linear-gradient(90deg, #006847 33.3%, #fff 33.3%, #fff 66.6%, #CE1126 66.6%) fixed; }

    /* Modals & Buttons */
    #num-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; }
    #num-input-box { background: #1a1a1a; padding: 2.5rem; border-radius: 30px; text-align: center; width: 85%; max-width: 320px; border: 1px solid #333; }
    #numeric-field { width: 100%; background: transparent; border: none; border-bottom: 2px solid #edbf37; color: #fff; font-size: 3rem; text-align: center; outline: none; margin-bottom: 20px; }
    
    .action-btn { background: rgba(255,255,255,0.15); border: none; color: #fff; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .copy-btn { width: 100%; margin-top: 20px; padding: 15px; border-radius: 20px; background: rgba(255,255,255,0.05); color: #fff; border: 1px solid rgba(255,255,255,0.15); text-transform: uppercase; letter-spacing: 2px; font-size: 0.7rem; }
    
    a.location-link { color: #fff; text-decoration: underline; text-underline-offset: 4px; }
  </style>
</head>
<body class="mode-tuliptown">

  <div id="num-overlay">
    <div id="num-input-box">
      <div id="modal-label" class="label" style="margin-bottom:15px;">Update</div>
      <input type="number" inputmode="decimal" id="numeric-field">
      <div style="display:flex; gap:10px;">
        <button onclick="closeModal()" style="flex:1; padding:12px; background:#333; color:#fff; border-radius:12px; border:none;">Cancel</button>
        <button id="save-num-btn" style="flex:1; padding:12px; background:#fff; color:#000; border-radius:12px; border:none; font-weight:bold;">Save</button>
      </div>
    </div>
  </div>

  <div class="card">
    <div id="status-container">Syncing...</div>
    <button id="copyBtn" class="copy-btn" onclick="copyContext()">Copy Floyd Context</button>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycby2O7_G_lbpkJCvm6bK3AV9Eh_EKMd5y8H4oo15aL7OwvyeRDz7uQ5pbaaqqjQ5GblH/exec";
    let activeKey = "";
    let voiceTimer;
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = 'en-US';

    async function copyContext() {
  const btn = document.getElementById('copyBtn');
  btn.innerText = 'Fetching...';
  try {
    const res = await fetch(`${API_URL}?type=context`);
    const data = await res.json();
    const el = document.createElement('textarea');
    el.value = JSON.stringify(data, null, 2);
    document.body.appendChild(el);
    el.select();
    document.execCommand('copy');
    document.body.removeChild(el);
    btn.innerText = 'Copied!';
    setTimeout(() => btn.innerText = 'Copy Floyd Context', 3000);
  } catch(e) {
    btn.innerText = 'Failed — Try Again';
  }
}
    
    async function refresh() {
  var script = document.createElement('script');
  script.src = API_URL + '?type=dashboard&callback=render&t=' + Date.now();
  document.body.appendChild(script);
}

    function triggerUpdate(key, label) {
      activeKey = key;
      document.getElementById('modal-label').innerText = label;
      document.getElementById('numeric-field').value = "";
      document.getElementById('num-overlay').style.display = 'flex';
      setTimeout(() => document.getElementById('numeric-field').focus(), 100);
    }

    function closeModal() { document.getElementById('num-overlay').style.display = 'none'; }

    document.getElementById('save-num-btn').onclick = async function() {
      const val = document.getElementById('numeric-field').value;
      if(!val) return;
      this.innerText = "...";
      await fetch(API_URL, { method: 'POST', body: JSON.stringify({ key: activeKey, value: val }) });
      this.innerText = "Save";
      closeModal();
      refresh();
    };

    function startVoice(e) {
      e.preventDefault();
      voiceTimer = setTimeout(() => {
        try { recognition.start(); window.navigator.vibrate(50); } catch(e){}
      }, 600);
    }

    function stopVoice() {
      clearTimeout(voiceTimer);
      try { recognition.stop(); } catch(e){}
    }

    recognition.onresult = async (event) => {
      const text = event.results[0][0].transcript;
      document.getElementById('status-container').innerText = "Logging: " + text;
      await fetch(API_URL, { method: 'POST', body: JSON.stringify({ key: 'voice_note', value: text }) });
      setTimeout(refresh, 1500);
    };

    function render(data) {
      document.body.className = 'mode-' + data.system_mode;
      const order = ['daily_allowance', 'spendable_balance', 'gas_target', 'peter_appointments', 'esther_mood', 'esther_finish_location', 'current_location'];
      let html = '';
      
      order.forEach(key => {
        if (!data[key] && key !== 'current_location') return;
        
        if (key === 'current_location') {
          let icon = (data.system_mode === 'van') ? "favicon squoosh.png" : (data.system_mode === 'international') ? "travel.png" : "tuliptown.webp";
          let style = `style="background-image: url('${icon}')"`;
          html += `<div class="status-item"><span class="label">Location</span><div class="location-container">
            <span class="value"><a href="${data[key]}" target="_blank" class="location-link">${data.location_city}</a></span>
            <div class="mode-icon" ${style} ontouchstart="startVoice(event)" ontouchend="stopVoice()"></div>
          </div></div>`;
        } else {
          let btn = '';
          if(key === 'gas_target') btn = `<button class="action-btn" onclick="triggerUpdate('odometer','Odometer')">+</button>`;
          if(key === 'spendable_balance') btn = `<button class="action-btn" onclick="triggerUpdate('spendable_balance','Balance')">✎</button>`;
          html += `<div class="status-item"><span class="label">${key.replace(/_/g,' ')}</span>
            <div style="display:flex; justify-content:space-between; align-items:center;">
            <span class="value value-${key}">${data[key]}</span>${btn}</div></div>`;
        }
      });
      document.getElementById('status-container').innerHTML = html;
    }

    refresh();
    setInterval(refresh, 60000);
  </script>
</body>
</html>
